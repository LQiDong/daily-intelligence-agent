# Daily Intelligence Agent — Automated Report
#
# 每天北京时间 08:00 自动运行（UTC 00:00），
# 同时支持 workflow_dispatch 手动触发。
#
# 所有密钥从 GitHub Secrets 读取，请在以下位置配置：
#   Settings → Secrets and variables → Actions → New repository secret
#
# 需要配置的 Secrets：
#   LLM_API_KEY              （必填）LLM API 密钥
#   EMAIL_USER               （必填）发件邮箱地址
#   EMAIL_PASSWORD           （必填）邮箱授权码 / App Password
#   EMAIL_TO                 （必填）收件人邮箱
#   NEWS_API_KEY             （选填）NewsAPI.org 密钥
#   ALPHA_VANTAGE_API_KEY    （选填）Alpha Vantage 密钥

name: Daily Intelligence Report

on:
  schedule:
    # 每天北京时间 08:00 = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      log_level:
        description: "日志级别"
        required: false
        default: "INFO"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING

env:
  PYTHON_VERSION: "3.11"
  PYTHONUNBUFFERED: 1

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env from GitHub Secrets
        run: |
          cat > .env << 'ENVEOF'
          # ===== LLM API =====
          LLM_PROVIDER=openai
          OPENAI_API_KEY=${{ secrets.LLM_API_KEY }}
          OPENAI_BASE_URL=https://api.openai.com/v1
          OPENAI_MODEL=gpt-4o

          # ===== SMTP =====
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=${{ secrets.EMAIL_USER }}
          SMTP_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM=${{ secrets.EMAIL_USER }}
          EMAIL_TO=${{ secrets.EMAIL_TO }}

          # ===== Collector API Keys =====
          NEWSAPI_API_KEY=${{ secrets.NEWS_API_KEY }}
          ALPHA_VANTAGE_API_KEY=${{ secrets.ALPHA_VANTAGE_API_KEY }}

          # ===== Collector Switches =====
          COLLECTOR_RSS_ENABLED=true
          COLLECTOR_NEWSAPI_ENABLED=true
          COLLECTOR_GDELT_ENABLED=true
          COLLECTOR_ALPHA_VANTAGE_ENABLED=true
          COLLECTOR_ARXIV_ENABLED=true

          # ===== RSS Feeds =====
          RSS_FEEDS=https://hnrss.org/frontpage,https://feeds.feedburner.com/TechCrunch,https://www.theverge.com/rss/index.xml,https://feeds.arstechnica.com/arstechnica/index

          # ===== Application =====
          LOG_LEVEL=${{ inputs.log_level || 'INFO' }}
          DATA_RETENTION_DAYS=7
          FETCH_DAYS=3
          SCHEDULED_TIME=08:00
          HTTP_TIMEOUT=30
          ENVEOF
          echo ".env created successfully"
          echo "---"
          echo "OPENAI_API_KEY=$(echo \"${OPENAI_API_KEY:-}\" | head -c 8)******"
          echo "EMAIL_USER=$(echo \"${EMAIL_USER:-}\" | sed 's/^\(.\{3\}\).*/\1***/')"
          echo "EMAIL_TO=${EMAIL_TO:-not set}"
          echo "LOG_LEVEL=${LOG_LEVEL:-INFO}"
          echo "---"

      - name: Run Daily Intelligence Agent
        run: |
          python src/main.py 2>&1

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports
          path: reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Print report summary
        if: always()
        run: |
          echo "=== Generated Reports ==="
          ls -lh reports/ 2>/dev/null || echo "No reports directory"
          echo ""
          echo "=== Pipeline Status ==="
          echo "Job completed. See logs above for full details."
